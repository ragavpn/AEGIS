name: AEGIS CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    name: Validate Code & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create secrets.properties for Android
        working-directory: ./aegis-android
        run: |
          echo "SUPABASE_URL=\"${{ secrets.SUPABASE_URL }}\"" > secrets.properties
          echo "SUPABASE_ANON_KEY=\"${{ secrets.SUPABASE_ANON_KEY }}\"" >> secrets.properties
          echo "AEGIS_API_BASE_URL=\"${{ vars.BACKEND_PUBLIC_URL || 'https://localhost' }}\"" >> secrets.properties
          touch local.properties

      - name: Grant execute permission for gradlew
        working-directory: ./aegis-android
        run: chmod +x gradlew

      - name: Create google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > aegis-android/app/google-services.json

      - name: Build Android Debug APK (Validation)
        working-directory: ./aegis-android
        run: ./gradlew assembleDebug

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Crucix dependencies
        working-directory: ./aegis-crucix
        run: npm ci || npm install

      - name: Run Crucix tests
        working-directory: ./aegis-crucix
        run: npm test --if-present

      - name: Install backend dependencies
        working-directory: ./aegis-backend
        run: npm ci || npm install

      - name: Run backend tests
        working-directory: ./aegis-backend
        run: npm test --if-present

  deploy:
    name: Deploy to Railway & GHCR
    needs: validate
    if: github.ref == 'refs/heads/main' && vars.DEPLOY == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set lower case repository name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and push aegis-backend image
        uses: docker/build-push-action@v5
        with:
          context: ./aegis-backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/aegis-backend:sha-${{ github.sha }}
            ghcr.io/${{ env.REPO_LC }}/aegis-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push aegis-crucix image
        uses: docker/build-push-action@v5
        with:
          context: ./aegis-crucix
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/aegis-crucix:sha-${{ github.sha }}
            ghcr.io/${{ env.REPO_LC }}/aegis-crucix:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Deploy to Railway (clean recreate services)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
        run: |
          set -e

          echo "Using Railway project token authentication..."

          export RAILWAY_TOKEN=${{ secrets.RAILWAY_TOKEN }}
          export RAILWAY_PROJECT_ID=$PROJECT_ID

          echo "Verifying access to project..."

          railway service list || echo "No services yet"

          echo "Deleting existing services (required for free plan)..."

          services=$(railway service list --json 2>/dev/null | jq -r '.[].name' || true)

          if [ -n "$services" ]; then
            for service in $services; do
              echo "Deleting service: $service"
              railway service delete --service "$service" --yes
            done
          else
            echo "No existing services found"
          fi

          echo "Creating Crucix service..."

          echo "Deploying Crucix service (Railway will create if missing)..."

          railway variables set \
            PORT=3117 \
            REFRESH_INTERVAL_MINUTES=15 \
            AEGIS_SECRET=${{ secrets.CRUCIX_BACKEND_AEGIS_SECRET }} \
            LLM_API_KEY=${{ secrets.CRUCIX_LLM_API_KEY }} \
            LLM_BASE_URL=https://models.inference.ai.azure.com/chat/completions \
            LLM_MODEL=gpt-4o \
            RAILWAY_REGISTRY_AUTH_USERNAME=${{ github.actor }} \
            RAILWAY_REGISTRY_AUTH_PASSWORD=${{ secrets.GHCR_TOKEN }}

          railway up \
            --service aegis-crucix \
            --image ghcr.io/${{ env.REPO_LC }}/aegis-crucix:sha-${{ github.sha }}

          echo "Creating Backend service..."

          echo "Deploying Backend service (Railway will create if missing)..."

          railway variables set \
            NODE_ENV=production \
            CRUCIX_BASE_URL=http://aegis-crucix.railway.internal:3117 \
            CRUCIX_SECRET=${{ secrets.CRUCIX_BACKEND_AEGIS_SECRET }} \
            ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }} \
            ELEVENLABS_VOICE_ID=JBFqnCBsd6RMkjVDRZzb \
            FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT }} \
            HF_TOKEN=${{ secrets.HF_TOKEN }} \
            HUGGINGFACE_VOICE_ID=af_heart \
            LLM_API_KEY=${{ secrets.BACKEND_LLM_API_KEY }} \
            LLM_BASE_URL=https://models.inference.ai.azure.com/chat/completions \
            LLM_MODEL=gpt-4o-mini \
            NEO4J_PASSWORD=${{ secrets.NEO4J_PASSWORD }} \
            NEO4J_URI=neo4j+s://07c6da35.databases.neo4j.io \
            NEO4J_USERNAME=neo4j \
            SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }} \
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}

          railway up \
            --service aegis-backend \
            --image ghcr.io/${{ env.REPO_LC }}/aegis-backend:sha-${{ github.sha }}

          echo "Deployment complete"

      - name: Wait for services to be ready
        run: sleep 60

      - name: Health check (Backend)
        if: vars.BACKEND_PUBLIC_URL != ''
        run: curl --fail ${{ vars.BACKEND_PUBLIC_URL }}/health

      - name: Health check (Crucix via Backend proxy)
        if: vars.BACKEND_PUBLIC_URL != ''
        run: curl --fail ${{ vars.BACKEND_PUBLIC_URL }}/crucix/health

  sign-android:
    name: Sign & Release Android APK
    needs: validate
    if: github.ref == 'refs/heads/main' && vars.DEPLOY == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create secrets.properties for Android
        working-directory: ./aegis-android
        run: |
          echo "SUPABASE_URL=\"${{ secrets.SUPABASE_URL }}\"" > secrets.properties
          echo "SUPABASE_ANON_KEY=\"${{ secrets.SUPABASE_ANON_KEY }}\"" >> secrets.properties
          echo "AEGIS_API_BASE_URL=\"${{ vars.BACKEND_PUBLIC_URL || 'https://localhost' }}\"" >> secrets.properties
          touch local.properties

      - name: Grant execute permission for gradlew
        working-directory: ./aegis-android
        run: chmod +x gradlew

      - name: Create Keystore
        working-directory: ./aegis-android
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > upload-keystore.keystore

      - name: Create keystore.properties
        working-directory: ./aegis-android
        run: |
          echo "storeFile=upload-keystore.keystore" > keystore.properties
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties

      - name: Create google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > aegis-android/app/google-services.json

      - name: Build Release APK
        working-directory: ./aegis-android
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: aegis-android/app/build/outputs/apk/release/app-release.apk

  database-migration:
    name: Run Database Migrations
    needs: deploy
    if: github.ref == 'refs/heads/main' && vars.DEPLOY == 'true' && vars.SUPABASE_PROJECT_ID != ''
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run Supabase migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --project-id ${{ vars.SUPABASE_PROJECT_ID }}
