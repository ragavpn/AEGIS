name: AEGIS CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    name: Validate Code & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create secrets.properties for Android
        working-directory: ./aegis-android
        run: |
          echo "SUPABASE_URL=\"${{ secrets.SUPABASE_URL }}\"" > secrets.properties
          echo "SUPABASE_ANON_KEY=\"${{ secrets.SUPABASE_ANON_KEY }}\"" >> secrets.properties
          echo "AEGIS_API_BASE_URL=\"${{ vars.BACKEND_PUBLIC_URL || 'https://localhost' }}\"" >> secrets.properties
          touch local.properties

      - name: Grant execute permission for gradlew
        working-directory: ./aegis-android
        run: chmod +x gradlew

      - name: Create google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > aegis-android/app/google-services.json

      - name: Build Android Debug APK (Validation)
        working-directory: ./aegis-android
        run: ./gradlew assembleDebug

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Crucix dependencies
        working-directory: ./aegis-crucix
        run: npm ci || npm install

      - name: Run Crucix tests
        working-directory: ./aegis-crucix
        run: npm test --if-present

      - name: Install backend dependencies
        working-directory: ./aegis-backend
        run: npm ci || npm install

      - name: Run backend tests
        working-directory: ./aegis-backend
        run: npm test --if-present

  deploy:
    name: Deploy to Railway & GHCR
    needs: validate
    if: github.ref == 'refs/heads/main' && vars.DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set lower case repository name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and push aegis-backend image
        uses: docker/build-push-action@v5
        with:
          context: ./aegis-backend
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/aegis-backend:sha-${{ github.sha }},ghcr.io/${{ env.REPO_LC }}/aegis-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push aegis-crucix image
        uses: docker/build-push-action@v5
        with:
          context: ./aegis-crucix
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/aegis-crucix:sha-${{ github.sha }},ghcr.io/${{ env.REPO_LC }}/aegis-crucix:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy services from GHCR and set variables
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}

        run: |
          REPO="ghcr.io/${{ github.repository_owner }}/aegis"
          SHA_TAG="sha-${{ github.sha }}"

          # aegis-crucix: create/update service from GHCR image
          railway add \
            --service aegis-crucix \
            --image "$REPO/aegis-crucix:$SHA_TAG" \
            -v "AEGIS_SECRET=${{ secrets.CRUCIX_BACKEND_AEGIS_SECRET }}" \
            -v "LLM_API_KEY=${{ secrets.CRUCIX_LLM_API_KEY }}" \
            -v "LLM_BASE_URL=https://models.inference.ai.azure.com/chat/completions" \
            -v "LLM_MODEL=gpt-4o" \
            -v "PORT=3117" \
            -v "REFRESH_INTERVAL_MINUTES=15"

          # aegis-backend: create/update service from GHCR image
          railway add \
            --service aegis-backend \
            --image "$REPO/aegis-backend:$SHA_TAG" \
            -v "CRUCIX_BASE_URL=http://aegis-crucix.railway.internal:3117" \
            -v "CRUCIX_SECRET=${{ secrets.CRUCIX_BACKEND_AEGIS_SECRET }}" \
            -v "ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}" \
            -v "ELEVENLABS_VOICE_ID=JBFqnCBsd6RMkjVDRZzb" \
            -v "FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" \
            -v "HF_TOKEN=${{ secrets.HF_TOKEN }}" \
            -v "HUGGINGFACE_VOICE_ID=af_heart" \
            -v "LLM_API_KEY=${{ secrets.BACKEND_LLM_API_KEY }}" \
            -v "LLM_BASE_URL=https://models.inference.ai.azure.com/chat/completions" \
            -v "LLM_MODEL=gpt-4o-mini" \
            -v "NEO4J_PASSWORD=${{ secrets.NEO4J_PASSWORD }}" \
            -v "NEO4J_URI=neo4j+s://07c6da35.databases.neo4j.io" \
            -v "NEO4J_USERNAME=neo4j" \
            -v "NODE_ENV=production" \
            -v "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -v "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
            -v "TTS_SERVICE=huggingface"


      - name: Wait for services to be ready
        run: sleep 45

      - name: Health check (Backend)
        if: vars.BACKEND_PUBLIC_URL != ''
        run: curl --fail ${{ vars.BACKEND_PUBLIC_URL }}/health

      - name: Health check (Crucix via Backend proxy)
        if: vars.BACKEND_PUBLIC_URL != ''
        run: curl --fail ${{ vars.BACKEND_PUBLIC_URL }}/crucix/health

  sign-android:
    name: Sign & Release Android APK
    needs: validate
    if: github.ref == 'refs/heads/main' && vars.DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create secrets.properties for Android
        working-directory: ./aegis-android
        run: |
          echo "SUPABASE_URL=\"${{ secrets.SUPABASE_URL }}\"" > secrets.properties
          echo "SUPABASE_ANON_KEY=\"${{ secrets.SUPABASE_ANON_KEY }}\"" >> secrets.properties
          echo "AEGIS_API_BASE_URL=\"${{ vars.BACKEND_PUBLIC_URL || 'https://localhost' }}\"" >> secrets.properties
          touch local.properties

      - name: Grant execute permission for gradlew
        working-directory: ./aegis-android
        run: chmod +x gradlew

      - name: Create Keystore
        working-directory: ./aegis-android
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > upload-keystore.keystore

      - name: Create keystore.properties
        working-directory: ./aegis-android
        run: |
          echo "storeFile=upload-keystore.keystore" > keystore.properties
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties

      - name: Create google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > aegis-android/app/google-services.json

      - name: Build Release APK
        working-directory: ./aegis-android
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: aegis-android/app/build/outputs/apk/release/app-release.apk

  database-migration:
    name: Run Database Migrations
    needs: deploy
    if: github.ref == 'refs/heads/main' && vars.DEPLOY == 'true' && vars.SUPABASE_PROJECT_ID != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run Supabase migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --project-id ${{ vars.SUPABASE_PROJECT_ID }}
