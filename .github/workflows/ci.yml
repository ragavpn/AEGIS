name: AEGIS CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-backend:
    name: Validate Backend
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-validate]')"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node (cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aegis-backend/package-lock.json
      - name: Install backend deps
        working-directory: ./aegis-backend
        run: npm ci
      - name: Test backend
        working-directory: ./aegis-backend
        run: npm test --if-present

  validate-crucix:
    name: Validate Crucix
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-validate]')"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node (cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aegis-crucix/package-lock.json
      - name: Install crucix deps
        working-directory: ./aegis-crucix
        run: npm ci
      - name: Test crucix
        working-directory: ./aegis-crucix
        run: npm test --if-present

  validate-android:
    name: Validate Android
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-validate]')"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Prepare Android config
        working-directory: ./aegis-android
        run: |
          echo "SUPABASE_URL=\"${{ secrets.SUPABASE_URL }}\"" > secrets.properties
          echo "SUPABASE_ANON_KEY=\"${{ secrets.SUPABASE_ANON_KEY }}\"" >> secrets.properties
          echo "AEGIS_API_BASE_URL=\"${{ vars.BACKEND_PUBLIC_URL || 'https://localhost' }}\"" >> secrets.properties
          touch local.properties
      - name: Build APK (cached)
        working-directory: ./aegis-android
        run: ./gradlew assembleDebug --build-cache

      

  deploy:
    name: Deploy to Railway & GHCR
    needs: [validate-backend, validate-crucix, validate-android]
    if: github.ref == 'refs/heads/main' && vars.DEPLOY == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set lower case repository name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and push aegis-backend image
        uses: docker/build-push-action@v5
        with:
          context: ./aegis-backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/aegis-backend:sha-${{ github.sha }}
            ghcr.io/${{ env.REPO_LC }}/aegis-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      

      - name: Build and push aegis-crucix image
        uses: docker/build-push-action@v5
        with:
          context: ./aegis-crucix
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/aegis-crucix:sha-${{ github.sha }}
            ghcr.io/${{ env.REPO_LC }}/aegis-crucix:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Deploy to Railway (API only, no CLI)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          REPO_LC: ${{ env.REPO_LC }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          api() {
            curl -fsSL https://backboard.railway.com/graphql/v2 \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              --data-raw "$1"
          }

          echo "Fetch existing services..."
          SERVICES_JSON=$(api "$(jq -n --arg id \"$PROJECT_ID\" '{query:"query($id: String!){ project(id:$id){ services{ edges{ node{ id name }}}}}", variables:{id:$id}}')")
          SERVICE_IDS=$(printf '%s' "$SERVICES_JSON" | jq -r '.data.project.services.edges[].node.id // empty')

          if [ -n "$SERVICE_IDS" ]; then
            echo "Deleting existing services (free plan)..."
            while IFS= read -r SID; do
              [ -n "$SID" ] || continue
              api "$(jq -n --arg id \"$SID\" '{query:"mutation($id:String!){ serviceDelete(id:$id) }", variables:{id:$id}}')" >/dev/null
            done <<< "$SERVICE_IDS"
          else
            echo "No existing services found"
          fi

          echo "Create services..."
          CRUCIX_CREATE=$(api "$(jq -n --arg pid \"$PROJECT_ID\" --arg name \"aegis-crucix\" '{query:"mutation($pid:String!,$name:String!){ serviceCreate(input:{projectId:$pid,name:$name}){ id name } }", variables:{pid:$pid,name:$name}}')")
          CRUCIX_ID=$(printf '%s' "$CRUCIX_CREATE" | jq -r '.data.serviceCreate.id')

          BACKEND_CREATE=$(api "$(jq -n --arg pid \"$PROJECT_ID\" --arg name \"aegis-backend\" '{query:"mutation($pid:String!,$name:String!){ serviceCreate(input:{projectId:$pid,name:$name}){ id name } }", variables:{pid:$pid,name:$name}}')")
          BACKEND_ID=$(printf '%s' "$BACKEND_CREATE" | jq -r '.data.serviceCreate.id')

          echo "Set variables (Crucix)..."
          set_var(){ api "$(jq -n --arg sid \"$1\" --arg k \"$2\" --arg v \"$3\" '{query:"mutation($sid:String!,$k:String!,$v:String!){ variableUpsert(input:{serviceId:$sid,key:$k,value:$v}){ id } }", variables:{sid:$sid,k:$k,v:$v}}')" >/dev/null; }

          set_var "$CRUCIX_ID" PORT "3117"
          set_var "$CRUCIX_ID" REFRESH_INTERVAL_MINUTES "15"
          set_var "$CRUCIX_ID" AEGIS_SECRET "${{ secrets.CRUCIX_BACKEND_AEGIS_SECRET }}"
          set_var "$CRUCIX_ID" LLM_API_KEY "${{ secrets.CRUCIX_LLM_API_KEY }}"
          set_var "$CRUCIX_ID" LLM_BASE_URL "https://models.inference.ai.azure.com/chat/completions"
          set_var "$CRUCIX_ID" LLM_MODEL "gpt-4o"

          echo "Set variables (Backend)..."
          set_var "$BACKEND_ID" NODE_ENV "production"
          set_var "$BACKEND_ID" CRUCIX_BASE_URL "http://aegis-crucix.railway.internal:3117"
          set_var "$BACKEND_ID" CRUCIX_SECRET "${{ secrets.CRUCIX_BACKEND_AEGIS_SECRET }}"
          set_var "$BACKEND_ID" ELEVENLABS_API_KEY "${{ secrets.ELEVENLABS_API_KEY }}"
          set_var "$BACKEND_ID" ELEVENLABS_VOICE_ID "JBFqnCBsd6RMkjVDRZzb"
          set_var "$BACKEND_ID" FIREBASE_SERVICE_ACCOUNT "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          set_var "$BACKEND_ID" HF_TOKEN "${{ secrets.HF_TOKEN }}"
          set_var "$BACKEND_ID" HUGGINGFACE_VOICE_ID "af_heart"
          set_var "$BACKEND_ID" LLM_API_KEY "${{ secrets.BACKEND_LLM_API_KEY }}"
          set_var "$BACKEND_ID" LLM_BASE_URL "https://models.inference.ai.azure.com/chat/completions"
          set_var "$BACKEND_ID" LLM_MODEL "gpt-4o-mini"
          set_var "$BACKEND_ID" NEO4J_PASSWORD "${{ secrets.NEO4J_PASSWORD }}"
          set_var "$BACKEND_ID" NEO4J_URI "neo4j+s://07c6da35.databases.neo4j.io"
          set_var "$BACKEND_ID" NEO4J_USERNAME "neo4j"
          set_var "$BACKEND_ID" SUPABASE_SERVICE_KEY "${{ secrets.SUPABASE_SERVICE_KEY }}"
          set_var "$BACKEND_ID" SUPABASE_URL "${{ secrets.SUPABASE_URL }}"

          echo "Deploy images (from GHCR)..."
          deploy_img(){ api "$(jq -n --arg sid \"$1\" --arg img \"$2\" '{query:"mutation($sid:String!,$img:String!){ deploymentCreate(input:{serviceId:$sid,source:{image:$img}}){ id } }", variables:{sid:$sid,img:$img}}')" >/dev/null; }

          deploy_img "$CRUCIX_ID" "ghcr.io/${REPO_LC}/aegis-crucix:sha-${SHA}"
          deploy_img "$BACKEND_ID" "ghcr.io/${REPO_LC}/aegis-backend:sha-${SHA}"

          echo "Deployment complete"

      - name: Wait for backend to be ready (retry)
        if: vars.BACKEND_PUBLIC_URL != ''
        run: |
          for i in {1..20}; do
            if curl --fail ${{ vars.BACKEND_PUBLIC_URL }}/health; then
              echo "Backend is up"; exit 0;
            fi
            echo "Waiting for backend... ($i)";
            sleep 5;
          done
          echo "Backend failed to become ready"; exit 1

      

  sign-android:
    name: Sign & Release Android APK
    needs: validate-android
    if: github.ref == 'refs/heads/main' && vars.DEPLOY == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create secrets.properties for Android
        working-directory: ./aegis-android
        run: |
          echo "SUPABASE_URL=\"${{ secrets.SUPABASE_URL }}\"" > secrets.properties
          echo "SUPABASE_ANON_KEY=\"${{ secrets.SUPABASE_ANON_KEY }}\"" >> secrets.properties
          echo "AEGIS_API_BASE_URL=\"${{ vars.BACKEND_PUBLIC_URL || 'https://localhost' }}\"" >> secrets.properties
          touch local.properties

      - name: Grant execute permission for gradlew
        working-directory: ./aegis-android
        run: chmod +x gradlew

      - name: Create Keystore
        working-directory: ./aegis-android
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > upload-keystore.keystore

      - name: Create keystore.properties
        working-directory: ./aegis-android
        run: |
          echo "storeFile=upload-keystore.keystore" > keystore.properties
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties

      - name: Create google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > aegis-android/app/google-services.json

      - name: Build Release APK
        working-directory: ./aegis-android
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: aegis-android/app/build/outputs/apk/release/app-release.apk

  database-migration:
    name: Run Database Migrations
    needs: deploy
    if: github.ref == 'refs/heads/main' && vars.DEPLOY == 'true' && vars.SUPABASE_PROJECT_ID != ''
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run Supabase migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --project-id ${{ vars.SUPABASE_PROJECT_ID }}
