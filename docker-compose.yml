version: '3.8'

services:
  backend:
    build:
      context: ./aegis-backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./aegis-backend/.env
    environment:
      - CRUCIX_BASE_URL=http://crucix:3117
    depends_on:
      - crucix

  crucix:
    build:
      context: ./aegis-crucix
      dockerfile: Dockerfile
    ports:
      - "3117:3117"
    env_file:
      - ./aegis-crucix/.env
